name: ServiceTrace CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint backend
        run: ruff check .
      - name: Typecheck backend
        run: mypy app
      - name: Test backend
        run: pytest

  backend-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: servicetrace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d servicetrace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/servicetrace_test
      SERVICE_TRACE_ENV: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Bootstrap dashboard demo data on PostgreSQL
        run: python ../scripts/dev_dashboard_demo.py --device-type DEMO-CI --tag CI --no-server
      - name: Re-run dashboard bootstrap on PostgreSQL
        run: python ../scripts/dev_dashboard_demo.py --device-type DEMO-CI --tag CI --no-server
      - name: Verify existing dashboard dataset on PostgreSQL
        run: python ../scripts/dev_dashboard_demo.py --device-type DEMO-CI --verify-only --skip-migrate --no-server
      - name: Smoke bootstrapped dashboard dataset on PostgreSQL
        env:
          SERVICE_TRACE_BOOTSTRAP_SMOKE: "1"
          SERVICE_TRACE_BOOTSTRAP_DEVICE_TYPE: DEMO-CI
        run: pytest tests/test_dashboard_bootstrap_smoke.py -q
      - name: Test backend on PostgreSQL
        run: pytest

  final-test-runner:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: final-test-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint runner
        run: ruff check .
      - name: Typecheck runner
        run: mypy servicetrace_runner
      - name: Test runner
        run: pytest

  web-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-app/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Test web app
        run: npm test
      - name: Build web app
        run: npm run build

  web-app-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-app/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install web dependencies
        working-directory: web-app
        run: npm ci
      - name: Install Playwright browser
        working-directory: web-app
        run: npx playwright install --with-deps chromium
      - name: Prepare backend demo data
        env:
          DATABASE_URL: sqlite:///./servicetrace_e2e.db
          SERVICE_TRACE_ENV: ci
        run: python scripts/dev_dashboard_demo.py --device-type DEMO-E2E --tag E2E --no-server
      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./servicetrace_e2e.db
          SERVICE_TRACE_ENV: ci
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/servicetrace-backend.log 2>&1 &
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/servicetrace-backend.log
          exit 1
      - name: Run web app e2e
        working-directory: web-app
        env:
          CI: true
        run: npm run e2e
      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/servicetrace-backend.log

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
