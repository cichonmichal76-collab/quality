name: ServiceTrace CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint backend
        run: ruff check .
      - name: Typecheck backend
        run: mypy app
      - name: Test backend
        run: pytest

  final-test-runner:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: final-test-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint runner
        run: ruff check .
      - name: Typecheck runner
        run: mypy servicetrace_runner
      - name: Test runner
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
