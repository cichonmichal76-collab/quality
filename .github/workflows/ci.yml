name: ServiceTrace CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint backend
        run: ruff check .
      - name: Typecheck backend
        run: mypy app
      - name: Test backend
        run: pytest

  backend-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: servicetrace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d servicetrace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/servicetrace_test
      SERVICE_TRACE_ENV: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Apply backend migrations
        run: alembic upgrade head
      - name: Seed and verify dashboard demo data on PostgreSQL
        run: python -m app.services.demo_seed --device-type DEMO-CI --tag CI --verify
      - name: Test backend on PostgreSQL
        run: pytest

  final-test-runner:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: final-test-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint runner
        run: ruff check .
      - name: Typecheck runner
        run: mypy servicetrace_runner
      - name: Test runner
        run: pytest

  web-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-app/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Test web app
        run: npm test
      - name: Build web app
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
